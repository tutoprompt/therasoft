<svg viewBox="0 0 280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fluxo de onboarding em 3 etapas conectadas -->
  <!-- Círculo decorativo de fundo -->
  <circle cx="140" cy="180" r="120" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none"/>
  <circle cx="140" cy="180" r="90" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>

  <!-- ETAPA 1 -->
  <rect x="30" y="24" width="220" height="72" rx="14" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" fill="rgba(255,255,255,0.06)"/>
  <!-- Número -->
  <circle cx="58" cy="60" r="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.30)" stroke-width="1.2"/>
  <text x="58" y="65" text-anchor="middle" font-size="14" fill="white" font-family="system-ui" opacity="0.85">1</text>
  <!-- Conteúdo -->
  <rect x="86" y="50" width="72" height="8" rx="4" fill="white" opacity="0.55"/>
  <rect x="86" y="64" width="120" height="5" rx="2.5" fill="white" opacity="0.25"/>
  <rect x="86" y="74" width="100" height="5" rx="2.5" fill="white" opacity="0.18"/>
  <!-- Check badge -->
  <circle cx="232" cy="60" r="12" fill="rgba(212,70,247,0.55)" stroke="rgba(212,70,247,0.4)" stroke-width="1"/>
  <path d="M227 60l3 3 6-6" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Linha conectora 1→2 -->
  <line x1="140" y1="96" x2="140" y2="132" stroke="rgba(255,255,255,0.20)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="140" cy="114" r="3" fill="rgba(255,255,255,0.30)"/>

  <!-- ETAPA 2 -->
  <rect x="30" y="132" width="220" height="72" rx="14" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="58" cy="168" r="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.30)" stroke-width="1.2"/>
  <text x="58" y="173" text-anchor="middle" font-size="14" fill="white" font-family="system-ui" opacity="0.85">2</text>
  <rect x="86" y="158" width="88" height="8" rx="4" fill="white" opacity="0.55"/>
  <rect x="86" y="172" width="110" height="5" rx="2.5" fill="white" opacity="0.25"/>
  <rect x="86" y="182" width="90" height="5" rx="2.5" fill="white" opacity="0.18"/>
  <!-- Mini calendário inline -->
  <rect x="196" y="152" width="44" height="36" rx="8" stroke="rgba(255,255,255,0.28)" stroke-width="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="207" cy="166" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="218" cy="166" r="2.5" fill="rgba(212,70,247,0.70)"/>
  <circle cx="229" cy="166" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="207" cy="177" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="218" cy="177" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="229" cy="177" r="2.5" fill="rgba(255,255,255,0.55)"/>

  <!-- Linha conectora 2→3 -->
  <line x1="140" y1="204" x2="140" y2="240" stroke="rgba(255,255,255,0.20)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="140" cy="222" r="3" fill="rgba(255,255,255,0.30)"/>

  <!-- ETAPA 3: destaque -->
  <rect x="20" y="240" width="240" height="80" rx="16" stroke="rgba(212,70,247,0.55)" stroke-width="1.8" fill="rgba(212,70,247,0.10)"/>
  <circle cx="56" cy="280" r="20" fill="rgba(212,70,247,0.22)" stroke="rgba(212,70,247,0.50)" stroke-width="1.4"/>
  <text x="56" y="285" text-anchor="middle" font-size="14" fill="white" font-family="system-ui" opacity="0.90">3</text>
  <rect x="86" y="268" width="64" height="8" rx="4" fill="white" opacity="0.70"/>
  <rect x="86" y="282" width="130" height="5" rx="2.5" fill="white" opacity="0.30"/>
  <rect x="86" y="293" width="100" height="5" rx="2.5" fill="white" opacity="0.22"/>
  <!-- Ícone coração/foco -->
  <path d="M224 272 C224 269 220 266 216 270 C212 266 208 269 208 272 C208 278 216 283 216 283 C216 283 224 278 224 272Z" stroke="rgba(212,70,247,0.80)" stroke-width="1.3" fill="rgba(212,70,247,0.20)"/>

  <!-- Linha decorativa inferior -->
  <path d="M60 336 Q140 348 220 336" stroke="rgba(255,255,255,0.12)" stroke-width="1.2" fill="none"/>
</svg>
