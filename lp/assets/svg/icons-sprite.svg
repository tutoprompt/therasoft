<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <!-- Chevron Down (FAQ) -->
  <symbol id="icon-chevron-down" viewBox="0 0 12 12" fill="none">
    <path d="M2 4l4 4 4-4" stroke="#D446F7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Checkmark (Pricing, Security, FAQ) -->
  <symbol id="icon-check" viewBox="0 0 12 12" fill="none">
    <path d="M2 6l3 3 5-5" stroke="#D446F7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Decorative Dot (dividers, eyebrows) -->
  <symbol id="icon-dot-deco" viewBox="0 0 4 4" fill="none">
    <circle cx="2" cy="2" r="2" fill="#D446F7"/>
  </symbol>

  <!-- Feature Icon: Document (Prontuários) -->
  <symbol id="icon-feat-doc" viewBox="0 0 24 24" fill="none">
    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="14,2 14,8 20,8" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="13" x2="8" y2="13" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="17" x2="8" y2="17" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10,9 9,9 8,9" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Feature Icon: Calendar (Agenda) -->
  <symbol id="icon-feat-calendar" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="4" width="18" height="18" rx="2" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="2" x2="16" y2="6" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="8" y1="2" x2="8" y2="6" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="3" y1="10" x2="21" y2="10" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Feature Icon: Chat (WhatsApp/Confirmações) -->
  <symbol id="icon-feat-chat" viewBox="0 0 24 24" fill="none">
    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Feature Icon: Chart (Visão Geral) -->
  <symbol id="icon-feat-chart" viewBox="0 0 24 24" fill="none">
    <line x1="18" y1="20" x2="18" y2="10" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="12" y1="20" x2="12" y2="4" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="6" y1="20" x2="6" y2="14" stroke="#2B7FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Metric Icon: Smiley (97% satisfação) -->
  <symbol id="icon-metric-smiley" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="10" stroke="#2B7FFF" stroke-width="1.5"/>
    <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="9" y1="9" x2="9.01" y2="9" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="9" x2="15.01" y2="9" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Metric Icon: Checkmark (35% menos faltas) -->
  <symbol id="icon-metric-check" viewBox="0 0 24 24" fill="none">
    <path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="22 4 12 14.01 9 11.01" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Metric Icon: Clock (2 min agendamento) -->
  <symbol id="icon-metric-clock" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="10" stroke="#2B7FFF" stroke-width="1.5"/>
    <polyline points="12 6 12 12 16 14" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Metric Icon: Map (8+ estados) -->
  <symbol id="icon-metric-map" viewBox="0 0 24 24" fill="none">
    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="8" y1="2" x2="8" y2="18" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="6" x2="16" y2="22" stroke="#2B7FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Security Icon: Lock (Proteção dispositivo) -->
  <symbol id="icon-sec-lock" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="11" width="18" height="11" rx="2" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 11V7a5 5 0 0110 0v4" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Security Icon: Shield (CFP Conformidade) -->
  <symbol id="icon-sec-shield" viewBox="0 0 24 24" fill="none">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Security Icon: Eye (Histórico acessos) -->
  <symbol id="icon-sec-eye" viewBox="0 0 24 24" fill="none">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="12" r="3" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Security Icon: Undo (Backup automático) -->
  <symbol id="icon-sec-undo" viewBox="0 0 24 24" fill="none">
    <polyline points="23 4 23 10 17 10" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" stroke="#D446F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Security Badge: Shield check -->
  <symbol id="icon-badge-security" viewBox="0 0 12 13" fill="none">
    <path d="M6 1L10.5 2.8V6.5C10.5 9 8.5 11.1 6 12C3.5 11.1 1.5 9 1.5 6.5V2.8L6 1Z" stroke="#D446F7" stroke-width="1.2" stroke-linejoin="round" fill="rgba(212,70,247,0.10)"/>
    <path d="M4 6.5L5.3 7.8L8 5" stroke="#D446F7" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
